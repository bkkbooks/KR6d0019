  text: 妙經文句私志記目次卷第一序品第一卷第二從釋文方軌盡如是因緣釋卷第三從約教釋如是終經文住字卷第四從經王城終皆是阿羅漢釋位義卷第五從歎羅漢德盡目蓮卷第六從迦旃延訖菩薩眾氣類卷第七從竪嘆菩薩德盡通序卷第八入別序釋卷第九入疑念序釋卷第十方便品第二盡釋題卷第十一方便品文從初盡於疑請卷第十二從廣開顯盡過去佛章開人天乘總問答卷第十三盡方便品文釋卷第十四入譬喻品第三釋文未及完結妙經文句私志記目次終
